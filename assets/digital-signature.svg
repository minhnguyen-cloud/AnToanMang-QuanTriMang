<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-label="Digital signature process">
  <rect width="980" height="520" fill="#ffffff"/>
  <text x="490" y="44" text-anchor="middle" font-family="Arial" font-size="28" font-weight="700" fill="#0f172a">Quy trình tạo và kiểm tra chữ ký số</text>
  <rect x="60" y="105" width="150" height="74" rx="8" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="135" y="136" text-anchor="middle" font-family="Arial" font-size="20" font-weight="700">Document</text>
  <text x="135" y="162" text-anchor="middle" font-family="Arial" font-size="16">M</text>
  <line x1="210" y1="142" x2="318" y2="142" stroke="#111827" stroke-width="3"/>
  <polygon points="318,142 300,132 300,152" fill="#111827"/>
  <rect x="320" y="105" width="150" height="74" rx="8" fill="#f8fafc" stroke="#334155" stroke-width="2"/>
  <text x="395" y="136" text-anchor="middle" font-family="Arial" font-size="20" font-weight="700">Hash</text>
  <text x="395" y="162" text-anchor="middle" font-family="Arial" font-size="16">SHA / digest</text>
  <line x1="470" y1="142" x2="578" y2="142" stroke="#111827" stroke-width="3"/>
  <polygon points="578,142 560,132 560,152" fill="#111827"/>
  <rect x="580" y="105" width="150" height="74" rx="8" fill="#ecfdf3" stroke="#0f766e" stroke-width="2"/>
  <text x="655" y="136" text-anchor="middle" font-family="Arial" font-size="20" font-weight="700">Sign</text>
  <text x="655" y="162" text-anchor="middle" font-family="Arial" font-size="16">PR sender</text>
  <line x1="730" y1="142" x2="838" y2="142" stroke="#111827" stroke-width="3"/>
  <polygon points="838,142 820,132 820,152" fill="#111827"/>
  <rect x="840" y="105" width="98" height="74" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="889" y="136" text-anchor="middle" font-family="Arial" font-size="20" font-weight="700">S</text>
  <text x="889" y="162" text-anchor="middle" font-family="Arial" font-size="16">Signature</text>
  <rect x="210" y="250" width="560" height="72" rx="8" fill="#f8fafc" stroke="#475569" stroke-width="2"/>
  <text x="490" y="281" text-anchor="middle" font-family="Arial" font-size="20" font-weight="700" fill="#0f172a">Gửi: Document M + Signature S + Certificate</text>
  <text x="490" y="307" text-anchor="middle" font-family="Arial" font-size="16" fill="#334155">Người nhận dùng public key trong certificate để verify</text>
  <line x1="490" y1="322" x2="490" y2="386" stroke="#111827" stroke-width="3"/>
  <polygon points="490,386 480,368 500,368" fill="#111827"/>
  <rect x="330" y="386" width="320" height="82" rx="8" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
  <text x="490" y="422" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700">Compare hash values</text>
  <text x="490" y="450" text-anchor="middle" font-family="Arial" font-size="17">Trùng nhau: toàn vẹn + xác thực nguồn</text>
</svg>
