<svg xmlns="http://www.w3.org/2000/svg" width="980" height="430" viewBox="0 0 980 430" role="img" aria-label="TCP RST spoofing diagram">
  <rect width="980" height="430" fill="#ffffff"/>
  <rect x="42" y="42" width="210" height="110" rx="8" fill="#eef6ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="147" y="82" text-anchor="middle" font-family="Arial" font-size="26" font-weight="700" fill="#0f172a">B</text>
  <text x="147" y="116" text-anchor="middle" font-family="Arial" font-size="20" fill="#0f172a">IP: 10.2.2.200</text>
  <text x="147" y="142" text-anchor="middle" font-family="Arial" font-size="20" fill="#0f172a">Port: 22222</text>
  <rect x="728" y="42" width="210" height="110" rx="8" fill="#ecfdf3" stroke="#0f766e" stroke-width="2"/>
  <text x="833" y="82" text-anchor="middle" font-family="Arial" font-size="26" font-weight="700" fill="#0f172a">A</text>
  <text x="833" y="116" text-anchor="middle" font-family="Arial" font-size="20" fill="#0f172a">IP: 10.1.1.100</text>
  <text x="833" y="142" text-anchor="middle" font-family="Arial" font-size="20" fill="#0f172a">Port: 11111</text>
  <line x1="255" y1="86" x2="725" y2="86" stroke="#111827" stroke-width="4"/>
  <polygon points="725,86 705,76 705,96" fill="#111827"/>
  <line x1="725" y1="126" x2="255" y2="126" stroke="#111827" stroke-width="4"/>
  <polygon points="255,126 275,116 275,136" fill="#111827"/>
  <text x="490" y="68" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#334155">TCP connection</text>
  <rect x="385" y="240" width="210" height="88" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="490" y="278" text-anchor="middle" font-family="Arial" font-size="24" font-weight="700" fill="#7c2d12">Attacker</text>
  <text x="490" y="306" text-anchor="middle" font-family="Arial" font-size="18" fill="#7c2d12">RST packet spoofed as B</text>
  <line x1="560" y1="238" x2="736" y2="146" stroke="#dc2626" stroke-width="4" stroke-dasharray="10 8"/>
  <polygon points="736,146 713,145 724,164" fill="#dc2626"/>
  <rect x="600" y="172" width="176" height="44" rx="6" fill="#fee2e2" stroke="#dc2626"/>
  <text x="688" y="201" text-anchor="middle" font-family="Arial" font-size="18" font-weight="700" fill="#7f1d1d">TCP RST</text>
  <text x="490" y="378" text-anchor="middle" font-family="Arial" font-size="20" fill="#334155">Muốn A chấp nhận, gói giả mạo phải khớp đúng IP/port của phiên và sequence hợp lệ.</text>
</svg>
