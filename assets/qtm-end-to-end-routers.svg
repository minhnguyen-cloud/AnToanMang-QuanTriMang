<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560" role="img" aria-label="End to end router topology">
  <defs>
    <style>
      .bg{fill:#f8fafc}.zone{fill:#fff;stroke:#cbd5e1;stroke-width:2}.router{fill:#dbeafe;stroke:#1d4ed8;stroke-width:2}.switch{fill:#dcfce7;stroke:#15803d;stroke-width:2}.server{fill:#fee2e2;stroke:#b91c1c;stroke-width:2}.cloud{fill:#ede9fe;stroke:#6d28d9;stroke-width:2}.txt{font-family:Segoe UI,Arial,sans-serif;fill:#0f172a;font-size:17px;font-weight:750}.small{font-size:13px;font-weight:600;fill:#475569}.link{stroke:#334155;stroke-width:3;fill:none}.vpn{stroke:#7c3aed;stroke-dasharray:8 7}.warn{fill:#fff7ed;stroke:#f97316;stroke-width:2}
    </style>
  </defs>
  <rect class="bg" width="1040" height="560"/>
  <rect class="zone" x="34" y="64" width="280" height="386" rx="8"/>
  <rect class="zone" x="382" y="64" width="276" height="386" rx="8"/>
  <rect class="zone" x="724" y="64" width="282" height="386" rx="8"/>
  <text class="txt" x="60" y="98">Chi nhánh A</text>
  <text class="txt" x="410" y="98">Core/DC</text>
  <text class="txt" x="750" y="98">Chi nhánh B</text>

  <rect class="switch" x="76" y="158" width="168" height="58" rx="8"/>
  <text class="txt" x="122" y="183">SW-A</text>
  <text class="small" x="92" y="204">VLAN 10: 192.168.10.0/24</text>
  <rect class="router" x="92" y="312" width="144" height="62" rx="8"/>
  <text class="txt" x="132" y="338">R-A</text>
  <text class="small" x="104" y="360">10.0.12.1/30</text>

  <rect class="router" x="430" y="168" width="168" height="64" rx="8"/>
  <text class="txt" x="477" y="195">R-Core</text>
  <text class="small" x="446" y="216">OSPF area 0</text>
  <rect class="server" x="430" y="314" width="168" height="72" rx="8"/>
  <text class="txt" x="470" y="342">Server LAN</text>
  <text class="small" x="452" y="364">10.10.30.0/24</text>

  <rect class="switch" x="784" y="158" width="168" height="58" rx="8"/>
  <text class="txt" x="830" y="183">SW-B</text>
  <text class="small" x="798" y="204">VLAN 20: 192.168.20.0/24</text>
  <rect class="router" x="800" y="312" width="144" height="62" rx="8"/>
  <text class="txt" x="840" y="338">R-B</text>
  <text class="small" x="812" y="360">10.0.23.2/30</text>

  <ellipse class="cloud" cx="514" cy="486" rx="122" ry="38"/>
  <text class="txt" x="468" y="492">Internet</text>
  <rect class="warn" x="730" y="470" width="244" height="54" rx="8"/>
  <text class="small" x="748" y="493">Yêu cầu: NAT Internet</text>
  <text class="small" x="748" y="512">VPN A-B bảo mật end-to-end</text>

  <path class="link" d="M160 216v96"/>
  <path class="link" d="M236 342h194"/>
  <path class="link" d="M598 200h180c54 0 94 42 94 112"/>
  <path class="link" d="M598 350h202"/>
  <path class="link" d="M514 386v62"/>
  <path class="link vpn" d="M164 374c120 108 552 108 708 0"/>
  <path class="link" d="M872 216v96"/>

  <text class="small" x="292" y="326">R-A to R-Core: 10.0.12.0/30</text>
  <text class="small" x="626" y="246">R-Core to R-B: 10.0.23.0/30</text>
  <text class="small" x="354" y="438">Purple dashed: IPsec/OpenVPN tunnel between branches</text>
</svg>
