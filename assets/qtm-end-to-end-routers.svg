<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="700" viewBox="0 0 1160 700" role="img" aria-labelledby="title desc">
  <title id="title">End to end branch routing topology</title>
  <desc id="desc">Clean Packet Tracer style branch A, core data center, branch B, server LAN, Internet and VPN topology with labels placed away from links.</desc>
  <defs>
    <style>
      .bg{fill:#f8fafc}.zone{fill:#fff;stroke:#cbd5e1;stroke-width:2}.router{fill:#dbeafe;stroke:#2563eb;stroke-width:2.4}.switch{fill:#dcfce7;stroke:#16a34a;stroke-width:2.4}.server{fill:#fee2e2;stroke:#dc2626;stroke-width:2.4}.cloud{fill:#ede9fe;stroke:#7c3aed;stroke-width:2.4}.note{fill:#fff7ed;stroke:#f97316;stroke-width:2}.label{fill:#fff;stroke:#cbd5e1;stroke-width:1.6}.txt{font-family:Segoe UI,Arial,sans-serif;fill:#0f172a;font-size:18px;font-weight:750}.small{font-family:Segoe UI,Arial,sans-serif;font-size:13px;font-weight:650;fill:#334155}.tiny{font-family:Segoe UI,Arial,sans-serif;font-size:12px;font-weight:650;fill:#475569}.link{stroke:#334155;stroke-width:4;stroke-linecap:round;fill:none}.wan{stroke:#0f172a;stroke-width:4;stroke-linecap:round;fill:none}.vpn{stroke:#7c3aed;stroke-width:4;stroke-dasharray:10 8;stroke-linecap:round;fill:none}.tableHead{fill:#dcfce7;stroke:#86efac}.tableRow{fill:#fff;stroke:#cbd5e1}
    </style>
  </defs>
  <rect class="bg" width="1160" height="700"/>

  <rect class="zone" x="36" y="74" width="300" height="390" rx="10"/>
  <rect class="zone" x="430" y="74" width="300" height="390" rx="10"/>
  <rect class="zone" x="824" y="74" width="300" height="390" rx="10"/>
  <text class="txt" x="62" y="108">Branch A</text>
  <text class="txt" x="456" y="108">Core / DC</text>
  <text class="txt" x="850" y="108">Branch B</text>

  <rect class="switch" x="100" y="150" width="160" height="56" rx="8"/>
  <text class="txt" x="180" y="174" text-anchor="middle">SW-A</text>
  <text class="small" x="180" y="195" text-anchor="middle">LAN A 192.168.10.0/24</text>
  <rect class="router" x="98" y="310" width="164" height="66" rx="8"/>
  <text class="txt" x="180" y="337" text-anchor="middle">R-A</text>
  <text class="small" x="180" y="360" text-anchor="middle">G0/1 192.168.10.1</text>
  <line class="link" x1="180" y1="206" x2="180" y2="310"/>

  <rect class="router" x="496" y="148" width="168" height="66" rx="8"/>
  <text class="txt" x="580" y="175" text-anchor="middle">R-Core</text>
  <text class="small" x="580" y="198" text-anchor="middle">OSPF area 0</text>
  <rect class="server" x="496" y="312" width="168" height="66" rx="8"/>
  <text class="txt" x="580" y="339" text-anchor="middle">Server LAN</text>
  <text class="small" x="580" y="362" text-anchor="middle">10.10.30.0/24</text>
  <line class="link" x1="580" y1="214" x2="580" y2="312"/>

  <rect class="switch" x="900" y="150" width="160" height="56" rx="8"/>
  <text class="txt" x="980" y="174" text-anchor="middle">SW-B</text>
  <text class="small" x="980" y="195" text-anchor="middle">LAN B 192.168.20.0/24</text>
  <rect class="router" x="898" y="310" width="164" height="66" rx="8"/>
  <text class="txt" x="980" y="337" text-anchor="middle">R-B</text>
  <text class="small" x="980" y="360" text-anchor="middle">G0/1 192.168.20.1</text>
  <line class="link" x1="980" y1="206" x2="980" y2="310"/>

  <path class="wan" d="M262 343 H496"/>
  <path class="wan" d="M664 181 H898"/>
  <path class="wan" d="M664 345 H898"/>

  <rect class="label" x="296" y="302" width="174" height="38" rx="6"/>
  <text class="tiny" x="383" y="318" text-anchor="middle">R-A to R-Core</text>
  <text class="tiny" x="383" y="334" text-anchor="middle">10.0.12.0/30</text>
  <rect class="label" x="690" y="132" width="174" height="38" rx="6"/>
  <text class="tiny" x="777" y="148" text-anchor="middle">R-Core to R-B</text>
  <text class="tiny" x="777" y="164" text-anchor="middle">10.0.23.0/30</text>
  <rect class="label" x="690" y="382" width="174" height="38" rx="6"/>
  <text class="tiny" x="777" y="398" text-anchor="middle">Server path to Branch B</text>
  <text class="tiny" x="777" y="414" text-anchor="middle">route via Core/DC</text>

  <ellipse class="cloud" cx="580" cy="520" rx="132" ry="44"/>
  <text class="txt" x="580" y="527" text-anchor="middle">Internet</text>
  <path class="link" d="M580 378 V476"/>
  <path class="vpn" d="M180 376 C330 610 830 610 980 376"/>
  <rect class="label" x="374" y="588" width="412" height="36" rx="6"/>
  <text class="small" x="580" y="611" text-anchor="middle">Dashed purple: IPsec/OpenVPN tunnel between branches</text>

  <rect class="note" x="846" y="492" width="254" height="72" rx="8"/>
  <text class="small" x="973" y="518" text-anchor="middle">Policy requirement</text>
  <text class="tiny" x="973" y="538" text-anchor="middle">NAT only Internet traffic</text>
  <text class="tiny" x="973" y="556" text-anchor="middle">Do not NAT internal/VPN traffic</text>

  <g transform="translate(62 628)">
    <rect class="tableHead" x="0" y="0" width="1036" height="28"/>
    <text class="small" x="12" y="19">Addressing table: LAN A GW 192.168.10.1 | Core server GW 10.10.30.1 | LAN B GW 192.168.20.1 | WAN: 10.0.12.0/30, 10.0.23.0/30</text>
  </g>
</svg>
