<svg xmlns="http://www.w3.org/2000/svg" width="980" height="430" viewBox="0 0 980 430" role="img" aria-label="ACL firewall diagram">
  <rect width="980" height="430" fill="#ffffff"/>
  <rect x="58" y="156" width="180" height="90" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="148" y="195" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700">Internet</text>
  <text x="148" y="224" text-anchor="middle" font-family="Arial" font-size="16">untrusted</text>
  <rect x="400" y="135" width="180" height="132" rx="10" fill="#f8fafc" stroke="#334155" stroke-width="3"/>
  <text x="490" y="177" text-anchor="middle" font-family="Arial" font-size="24" font-weight="700">Firewall</text>
  <text x="490" y="207" text-anchor="middle" font-family="Arial" font-size="18">ACL top-down</text>
  <text x="490" y="236" text-anchor="middle" font-family="Arial" font-size="18">implicit deny</text>
  <rect x="740" y="80" width="180" height="82" rx="8" fill="#ecfdf3" stroke="#0f766e" stroke-width="2"/>
  <text x="830" y="116" text-anchor="middle" font-family="Arial" font-size="21" font-weight="700">DMZ</text>
  <text x="830" y="142" text-anchor="middle" font-family="Arial" font-size="16">Web / Mail</text>
  <rect x="740" y="255" width="180" height="82" rx="8" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="830" y="291" text-anchor="middle" font-family="Arial" font-size="21" font-weight="700">Internal</text>
  <text x="830" y="317" text-anchor="middle" font-family="Arial" font-size="16">Database / Users</text>
  <line x1="238" y1="201" x2="396" y2="201" stroke="#111827" stroke-width="4"/>
  <polygon points="396,201 376,191 376,211" fill="#111827"/>
  <line x1="580" y1="174" x2="736" y2="121" stroke="#16a34a" stroke-width="4"/>
  <polygon points="736,121 713,119 726,139" fill="#16a34a"/>
  <line x1="580" y1="226" x2="736" y2="296" stroke="#dc2626" stroke-width="4" stroke-dasharray="9 7"/>
  <polygon points="736,296 713,297 725,277" fill="#dc2626"/>
  <text x="658" y="102" font-family="Arial" font-size="18" font-weight="700" fill="#166534">permit 80/443/25</text>
  <text x="655" y="352" font-family="Arial" font-size="18" font-weight="700" fill="#991b1b">deny by default</text>
</svg>
