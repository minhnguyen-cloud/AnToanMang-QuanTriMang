<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 820" role="img" aria-labelledby="title desc">
  <title id="title">Campus Packet Tracer style topology</title>
  <desc id="desc">Campus VLAN, core L3, DMZ, server LAN and edge router topology in Packet Tracer style with separated labels and addressing table.</desc>
  <defs>
    <style>
      .bg{fill:#f8fafc}.panel{fill:#fff;stroke:#cbd5e1;stroke-width:2}.pc{fill:#ccfbf1;stroke:#0f766e;stroke-width:3}.sw{fill:#14b8a6;stroke:#0f766e;stroke-width:3}.r{fill:#0f9f9a;stroke:#0f766e;stroke-width:3}.srv{fill:#fee2e2;stroke:#dc2626;stroke-width:3}.cloud{fill:#ede9fe;stroke:#7c3aed;stroke-width:3}.line{stroke:#111827;stroke-width:5;stroke-linecap:round}.wan{stroke:#dc2626;stroke-width:7;stroke-linecap:round;fill:none}.txt{font-family:Segoe UI,Arial,sans-serif;fill:#0f172a;font-weight:750;font-size:18px}.small{font-family:Segoe UI,Arial,sans-serif;font-size:14px;font-weight:650;fill:#334155}.tiny{font-family:Segoe UI,Arial,sans-serif;font-size:12px;font-weight:650;fill:#475569}.ip{font-family:Consolas,monospace;font-size:13px;font-weight:750;fill:#0f172a}.white{fill:#fff}.hdr{fill:#dcfce7;stroke:#86efac}.row{fill:#fff;stroke:#cbd5e1}.tag{fill:#fff7ed;stroke:#f97316}.callout{fill:#fff;stroke:#cbd5e1;stroke-width:1.5}
    </style>
  </defs>
  <rect class="bg" width="1240" height="820"/>
  <rect class="panel" x="24" y="24" width="1192" height="772" rx="10"/>

  <text class="txt" x="52" y="62">Campus VLAN / DMZ topology - Packet Tracer style</text>
  <text class="small" x="52" y="86">VLAN gateways, trunk links, DMZ server and Edge NAT are visible without labels crossing cables.</text>

  <rect class="pc" x="72" y="156" width="96" height="58" rx="7"/>
  <text class="txt" x="120" y="191" text-anchor="middle">PC-SV</text>
  <text class="ip" x="48" y="236">192.168.10.11/24</text>
  <text class="ip" x="48" y="254">GW 192.168.10.1</text>
  <rect class="pc" x="236" y="156" width="96" height="58" rx="7"/>
  <text class="txt" x="284" y="191" text-anchor="middle">PC-GV</text>
  <text class="ip" x="214" y="236">192.168.20.12/24</text>
  <text class="ip" x="214" y="254">GW 192.168.20.1</text>
  <rect class="sw" x="132" y="340" width="140" height="56" rx="7"/>
  <text class="txt white" x="202" y="375" text-anchor="middle">Access SW</text>
  <line class="line" x1="120" y1="214" x2="168" y2="340"/>
  <line class="line" x1="284" y1="214" x2="236" y2="340"/>

  <ellipse class="r" cx="500" cy="368" rx="76" ry="48"/>
  <text class="txt white" x="500" y="365" text-anchor="middle">Core L3</text>
  <text class="tiny white" x="500" y="386" text-anchor="middle">SVI + OSPF</text>
  <line class="line" x1="272" y1="368" x2="424" y2="368"/>
  <rect class="callout" x="292" y="314" width="170" height="42" rx="6"/>
  <text class="tiny" x="377" y="331" text-anchor="middle">Trunk Gi0/1</text>
  <text class="tiny" x="377" y="348" text-anchor="middle">allow VLAN 10,20,30</text>

  <rect class="tag" x="366" y="462" width="276" height="68" rx="8"/>
  <text class="tiny" x="384" y="484">VLAN10 SVI: 192.168.10.1/24</text>
  <text class="tiny" x="384" y="502">VLAN20 SVI: 192.168.20.1/24</text>
  <text class="tiny" x="384" y="520">VLAN30 SVI: 192.168.30.1/24</text>

  <rect class="srv" x="760" y="150" width="156" height="66" rx="8"/>
  <text class="txt" x="838" y="178" text-anchor="middle">WEB DMZ</text>
  <text class="ip" x="780" y="200">192.168.30.50</text>
  <rect class="srv" x="760" y="322" width="170" height="66" rx="8"/>
  <text class="txt" x="845" y="350" text-anchor="middle">DB / AD / DNS</text>
  <text class="ip" x="784" y="372">10.10.40.20</text>
  <path class="wan" d="M568 344 C640 238 700 182 760 182"/>
  <path class="wan" d="M576 376 C650 368 710 356 760 356"/>
  <rect class="callout" x="608" y="236" width="190" height="46" rx="6"/>
  <text class="tiny" x="703" y="255" text-anchor="middle">DMZ route / ACL</text>
  <text class="tiny" x="703" y="272" text-anchor="middle">permit only needed ports</text>

  <ellipse class="r" cx="1000" cy="368" rx="76" ry="48"/>
  <text class="txt white" x="1000" y="365" text-anchor="middle">Edge R1</text>
  <text class="tiny white" x="1000" y="386" text-anchor="middle">NAT + ACL</text>
  <path class="wan" d="M576 396 C710 462 858 462 934 392"/>
  <rect class="callout" x="700" y="492" width="216" height="46" rx="6"/>
  <text class="tiny" x="808" y="511" text-anchor="middle">Core-Edge 10.0.99.0/30</text>
  <text class="tiny" x="808" y="528" text-anchor="middle">OSPF area 0 + default route</text>

  <ellipse class="cloud" cx="1000" cy="592" rx="128" ry="44"/>
  <text class="txt" x="1000" y="599" text-anchor="middle">Internet</text>
  <line class="line" x1="1000" y1="416" x2="1000" y2="548"/>
  <rect class="tag" x="866" y="650" width="268" height="48" rx="8"/>
  <text class="tiny" x="884" y="672">NAT overload for LAN to Internet</text>
  <text class="tiny" x="884" y="690">No direct Internet to DB server</text>

  <g transform="translate(72 720)">
    <rect class="hdr" x="0" y="0" width="1096" height="30"/>
    <text class="small" x="12" y="21">Addressing table</text>
    <rect class="row" x="0" y="30" width="1096" height="30"/>
    <rect class="row" x="0" y="60" width="1096" height="30"/>
    <text class="tiny" x="14" y="50">VLAN10 Students 192.168.10.0/24 GW .1 | VLAN20 Teachers 192.168.20.0/24 GW .1 | VLAN30 DMZ 192.168.30.0/24 GW .1</text>
    <text class="tiny" x="14" y="80">Core-Edge 10.0.99.0/30 | Server LAN 10.10.40.0/24 | Check trunk, SVI, OSPF route, ACL hit count and NAT translations.</text>
  </g>
</svg>
