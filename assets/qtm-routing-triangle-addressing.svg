<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 820" role="img" aria-labelledby="title desc">
  <title id="title">Three router Packet Tracer addressing topology</title>
  <desc id="desc">Clean R1 R2 R3 triangle topology with switches, PCs, serial links, IP addresses, gateways, and addressing table. Labels are placed away from cables.</desc>
  <defs>
    <style>
      .bg{fill:#f8fafc}.panel{fill:#fff;stroke:#cbd5e1;stroke-width:2}.pc{fill:#ccfbf1;stroke:#0f766e;stroke-width:3}.sw{fill:#14b8a6;stroke:#0f766e;stroke-width:3}.r{fill:#0f9f9a;stroke:#0f766e;stroke-width:3}.line{stroke:#111827;stroke-width:5;stroke-linecap:round}.serial{stroke:#dc2626;stroke-width:7;stroke-linecap:round;fill:none}.txt{font-family:Segoe UI,Arial,sans-serif;fill:#0f172a;font-weight:750;font-size:18px}.small{font-family:Segoe UI,Arial,sans-serif;font-size:14px;font-weight:650;fill:#334155}.tiny{font-family:Segoe UI,Arial,sans-serif;font-size:12px;font-weight:650;fill:#475569}.ip{font-family:Consolas,monospace;font-size:13px;font-weight:750;fill:#0f172a}.white{fill:#fff}.hdr{fill:#dcfce7;stroke:#86efac}.row{fill:#fff;stroke:#cbd5e1}.tag{fill:#fff7ed;stroke:#f97316}.callout{fill:#fff;stroke:#cbd5e1;stroke-width:1.5}
    </style>
  </defs>
  <rect class="bg" width="1240" height="820"/>
  <rect class="panel" x="24" y="24" width="1192" height="772" rx="10"/>

  <text class="txt" x="52" y="62">R1-R2-R3 routing topology - Packet Tracer style</text>
  <text class="small" x="52" y="86">IP/default gateway labels are below hosts, and interface labels are separated from serial links.</text>

  <rect class="pc" x="62" y="226" width="96" height="58" rx="7"/>
  <text class="txt" x="110" y="261" text-anchor="middle">PC-A</text>
  <text class="ip" x="62" y="310">192.168.10.11/24</text>
  <text class="ip" x="62" y="328">GW 192.168.10.1</text>
  <rect class="pc" x="214" y="226" width="96" height="58" rx="7"/>
  <text class="txt" x="262" y="261" text-anchor="middle">PC-B</text>
  <text class="ip" x="214" y="310">192.168.10.12/24</text>
  <text class="ip" x="214" y="328">GW 192.168.10.1</text>
  <rect class="sw" x="134" y="394" width="132" height="54" rx="7"/>
  <text class="txt white" x="200" y="429" text-anchor="middle">S1</text>
  <ellipse class="r" cx="370" cy="421" rx="64" ry="44"/>
  <text class="txt white" x="370" y="428" text-anchor="middle">R1</text>
  <line class="line" x1="110" y1="284" x2="164" y2="394"/>
  <line class="line" x1="262" y1="284" x2="234" y2="394"/>
  <line class="line" x1="266" y1="421" x2="306" y2="421"/>
  <rect class="tag" x="70" y="484" width="300" height="48" rx="8"/>
  <text class="tiny" x="88" y="506">R1 G0/1: 192.168.10.1/24</text>
  <text class="tiny" x="88" y="524">LAN A default gateway</text>

  <rect class="pc" x="478" y="118" width="96" height="58" rx="7"/>
  <text class="txt" x="526" y="153" text-anchor="middle">PC-C</text>
  <text class="ip" x="440" y="98">192.168.20.11/24</text>
  <text class="ip" x="440" y="116">GW 192.168.20.1</text>
  <rect class="pc" x="666" y="118" width="96" height="58" rx="7"/>
  <text class="txt" x="714" y="153" text-anchor="middle">PC-D</text>
  <text class="ip" x="698" y="98">192.168.20.12/24</text>
  <text class="ip" x="698" y="116">GW 192.168.20.1</text>
  <rect class="sw" x="554" y="242" width="132" height="54" rx="7"/>
  <text class="txt white" x="620" y="277" text-anchor="middle">S2</text>
  <ellipse class="r" cx="620" cy="410" rx="64" ry="44"/>
  <text class="txt white" x="620" y="417" text-anchor="middle">R2</text>
  <line class="line" x1="526" y1="176" x2="584" y2="242"/>
  <line class="line" x1="714" y1="176" x2="656" y2="242"/>
  <line class="line" x1="620" y1="296" x2="620" y2="366"/>
  <rect class="tag" x="470" y="314" width="300" height="48" rx="8"/>
  <text class="tiny" x="488" y="336">R2 G0/1: 192.168.20.1/24</text>
  <text class="tiny" x="488" y="354">LAN B default gateway</text>

  <rect class="pc" x="904" y="226" width="96" height="58" rx="7"/>
  <text class="txt" x="952" y="261" text-anchor="middle">PC-E</text>
  <text class="ip" x="890" y="310">192.168.30.11/24</text>
  <text class="ip" x="890" y="328">GW 192.168.30.1</text>
  <rect class="pc" x="1060" y="226" width="96" height="58" rx="7"/>
  <text class="txt" x="1108" y="261" text-anchor="middle">PC-F</text>
  <text class="ip" x="1052" y="310">192.168.30.12/24</text>
  <text class="ip" x="1052" y="328">GW 192.168.30.1</text>
  <rect class="sw" x="970" y="394" width="132" height="54" rx="7"/>
  <text class="txt white" x="1036" y="429" text-anchor="middle">S3</text>
  <ellipse class="r" cx="860" cy="421" rx="64" ry="44"/>
  <text class="txt white" x="860" y="428" text-anchor="middle">R3</text>
  <line class="line" x1="952" y1="284" x2="1002" y2="394"/>
  <line class="line" x1="1108" y1="284" x2="1068" y2="394"/>
  <line class="line" x1="924" y1="421" x2="970" y2="421"/>
  <rect class="tag" x="850" y="484" width="300" height="48" rx="8"/>
  <text class="tiny" x="868" y="506">R3 G0/1: 192.168.30.1/24</text>
  <text class="tiny" x="868" y="524">LAN C default gateway</text>

  <path class="serial" d="M421 391 C474 342 524 322 565 384"/>
  <path class="serial" d="M675 386 C732 324 793 342 816 391"/>
  <path class="serial" d="M431 440 C548 520 694 520 800 440"/>

  <rect class="callout" x="392" y="258" width="198" height="46" rx="6"/>
  <text class="tiny" x="491" y="277" text-anchor="middle">R1 S0/0/0 10.0.12.1/30</text>
  <text class="tiny" x="491" y="294" text-anchor="middle">R2 S0/0/0 10.0.12.2/30</text>
  <rect class="callout" x="650" y="258" width="198" height="46" rx="6"/>
  <text class="tiny" x="749" y="277" text-anchor="middle">R2 S0/0/1 10.0.23.1/30</text>
  <text class="tiny" x="749" y="294" text-anchor="middle">R3 S0/0/1 10.0.23.2/30</text>
  <rect class="callout" x="500" y="542" width="248" height="46" rx="6"/>
  <text class="tiny" x="624" y="561" text-anchor="middle">R1 S0/0/1 10.0.13.1/30</text>
  <text class="tiny" x="624" y="578" text-anchor="middle">R3 S0/0/0 10.0.13.2/30</text>

  <g transform="translate(72 626)">
    <rect class="hdr" x="0" y="0" width="1096" height="30"/>
    <text class="small" x="12" y="21">Interface and subnet table</text>
    <rect class="row" x="0" y="30" width="1096" height="30"/>
    <rect class="row" x="0" y="60" width="1096" height="30"/>
    <rect class="row" x="0" y="90" width="1096" height="30"/>
    <rect class="row" x="0" y="120" width="1096" height="30"/>
    <text class="tiny" x="14" y="50">LAN A: R1 G0/1 192.168.10.1/24 | PC-A .11 GW .1 | PC-B .12 GW .1</text>
    <text class="tiny" x="14" y="80">LAN B: R2 G0/1 192.168.20.1/24 | PC-C .11 GW .1 | PC-D .12 GW .1</text>
    <text class="tiny" x="14" y="110">LAN C: R3 G0/1 192.168.30.1/24 | PC-E .11 GW .1 | PC-F .12 GW .1</text>
    <text class="tiny" x="14" y="140">Serial: R1-R2 10.0.12.0/30 | R2-R3 10.0.23.0/30 | R1-R3 10.0.13.0/30. Use OSPF area 0 or equivalent static routes.</text>
  </g>
</svg>
