<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 780" role="img" aria-labelledby="title desc">
  <title id="title">Three router Packet Tracer addressing topology</title>
  <desc id="desc">R1 R2 R3 triangle topology with switches, PCs, serial links, IP addresses, gateways, and an addressing table.</desc>
  <defs>
    <style>
      .bg{fill:#f8fafc}.panel{fill:#fff;stroke:#cbd5e1;stroke-width:2}.pc{fill:#ccfbf1;stroke:#0f766e;stroke-width:3}.sw{fill:#14b8a6;stroke:#0f766e;stroke-width:3}.r{fill:#0f9f9a;stroke:#0f766e;stroke-width:3}.line{stroke:#111827;stroke-width:5;stroke-linecap:round}.serial{stroke:#dc2626;stroke-width:7;stroke-linecap:round;fill:none}.txt{font-family:Segoe UI,Arial,sans-serif;fill:#0f172a;font-weight:750;font-size:18px}.small{font-size:14px;font-weight:650;fill:#334155}.tiny{font-size:12px;font-weight:650;fill:#475569}.ip{font-size:13px;font-weight:750;fill:#0f172a}.white{fill:#fff}.hdr{fill:#dcfce7;stroke:#86efac}.row{fill:#fff;stroke:#cbd5e1}.tag{fill:#fff7ed;stroke:#f97316}
    </style>
  </defs>
  <rect class="bg" width="1180" height="780"/>
  <rect class="panel" x="24" y="24" width="1132" height="732" rx="10"/>

  <text class="txt" x="52" y="62">R1-R2-R3 routing topology - Packet Tracer style</text>
  <text class="small" x="52" y="86">Visible LAN IPs, default gateways, serial /30 links and routing requirements.</text>

  <rect class="sw" x="112" y="420" width="128" height="52" rx="7"/>
  <text class="txt white" x="176" y="454" text-anchor="middle">S1</text>
  <ellipse class="r" cx="335" cy="445" rx="62" ry="42"/>
  <text class="txt white" x="335" y="452" text-anchor="middle">R1</text>
  <line class="line" x1="240" y1="445" x2="273" y2="445"/>
  <text class="tiny" x="254" y="432">G0/1</text>

  <rect class="pc" x="52" y="258" width="96" height="58" rx="7"/>
  <text class="txt" x="100" y="293" text-anchor="middle">PC-A</text>
  <line class="line" x1="100" y1="316" x2="146" y2="420"/>
  <text class="ip" x="42" y="338">192.168.10.11/24</text>
  <text class="ip" x="42" y="357">GW 192.168.10.1</text>

  <rect class="pc" x="198" y="258" width="96" height="58" rx="7"/>
  <text class="txt" x="246" y="293" text-anchor="middle">PC-B</text>
  <line class="line" x1="246" y1="316" x2="204" y2="420"/>
  <text class="ip" x="186" y="338">192.168.10.12/24</text>
  <text class="ip" x="186" y="357">GW 192.168.10.1</text>

  <rect class="sw" x="510" y="160" width="128" height="52" rx="7"/>
  <text class="txt white" x="574" y="194" text-anchor="middle">S2</text>
  <ellipse class="r" cx="574" cy="314" rx="62" ry="42"/>
  <text class="txt white" x="574" y="321" text-anchor="middle">R2</text>
  <line class="line" x1="574" y1="212" x2="574" y2="272"/>
  <text class="tiny" x="590" y="250">G0/1</text>

  <rect class="pc" x="430" y="50" width="96" height="58" rx="7"/>
  <text class="txt" x="478" y="85" text-anchor="middle">PC-C</text>
  <line class="line" x1="478" y1="108" x2="534" y2="160"/>
  <text class="ip" x="374" y="128">192.168.20.11/24</text>
  <text class="ip" x="374" y="147">GW 192.168.20.1</text>

  <rect class="pc" x="626" y="50" width="96" height="58" rx="7"/>
  <text class="txt" x="674" y="85" text-anchor="middle">PC-D</text>
  <line class="line" x1="674" y1="108" x2="614" y2="160"/>
  <text class="ip" x="658" y="128">192.168.20.12/24</text>
  <text class="ip" x="658" y="147">GW 192.168.20.1</text>

  <ellipse class="r" cx="825" cy="445" rx="62" ry="42"/>
  <text class="txt white" x="825" y="452" text-anchor="middle">R3</text>
  <rect class="sw" x="918" y="420" width="128" height="52" rx="7"/>
  <text class="txt white" x="982" y="454" text-anchor="middle">S3</text>
  <line class="line" x1="887" y1="445" x2="918" y2="445"/>
  <text class="tiny" x="890" y="432">G0/1</text>

  <rect class="pc" x="860" y="258" width="96" height="58" rx="7"/>
  <text class="txt" x="908" y="293" text-anchor="middle">PC-E</text>
  <line class="line" x1="908" y1="316" x2="950" y2="420"/>
  <text class="ip" x="800" y="338">192.168.30.11/24</text>
  <text class="ip" x="800" y="357">GW 192.168.30.1</text>

  <rect class="pc" x="1010" y="258" width="96" height="58" rx="7"/>
  <text class="txt" x="1058" y="293" text-anchor="middle">PC-F</text>
  <line class="line" x1="1058" y1="316" x2="1014" y2="420"/>
  <text class="ip" x="1000" y="338">192.168.30.12/24</text>
  <text class="ip" x="1000" y="357">GW 192.168.30.1</text>

  <path class="serial" d="M388 421 C452 340 486 326 514 314"/>
  <path class="serial" d="M636 314 C690 326 738 368 780 421"/>
  <path class="serial" d="M397 452 C520 510 650 510 764 452"/>
  <text class="tiny" x="418" y="348">R1 S0/0/0 10.0.12.1/30</text>
  <text class="tiny" x="510" y="376">R2 S0/0/0 10.0.12.2/30</text>
  <text class="tiny" x="662" y="348">R2 S0/0/1 10.0.23.1/30</text>
  <text class="tiny" x="765" y="380">R3 S0/0/1 10.0.23.2/30</text>
  <text class="tiny" x="470" y="536">R1 S0/0/1 10.0.13.1/30</text>
  <text class="tiny" x="654" y="536">R3 S0/0/0 10.0.13.2/30</text>

  <rect class="tag" x="76" y="494" width="296" height="46" rx="8"/>
  <text class="tiny" x="92" y="516">R1 G0/1: 192.168.10.1/24</text>
  <text class="tiny" x="92" y="534">LAN A default gateway</text>
  <rect class="tag" x="434" y="232" width="276" height="46" rx="8"/>
  <text class="tiny" x="450" y="254">R2 G0/1: 192.168.20.1/24</text>
  <text class="tiny" x="450" y="272">LAN B default gateway</text>
  <rect class="tag" x="792" y="494" width="296" height="46" rx="8"/>
  <text class="tiny" x="808" y="516">R3 G0/1: 192.168.30.1/24</text>
  <text class="tiny" x="808" y="534">LAN C default gateway</text>

  <g transform="translate(60 590)">
    <rect class="hdr" x="0" y="0" width="1060" height="30"/>
    <text class="small" x="12" y="21">Interface and subnet table</text>
    <rect class="row" x="0" y="30" width="1060" height="30"/>
    <rect class="row" x="0" y="60" width="1060" height="30"/>
    <rect class="row" x="0" y="90" width="1060" height="30"/>
    <rect class="row" x="0" y="120" width="1060" height="30"/>
    <text class="tiny" x="14" y="50">R1 G0/1 192.168.10.1/24 | R2 G0/1 192.168.20.1/24 | R3 G0/1 192.168.30.1/24</text>
    <text class="tiny" x="14" y="80">R1-R2: 10.0.12.0/30 (R1 .1, R2 .2) | R2-R3: 10.0.23.0/30 (R2 .1, R3 .2)</text>
    <text class="tiny" x="14" y="110">R1-R3: 10.0.13.0/30 (R1 .1, R3 .2). Dynamic routing: OSPF area 0 or equivalent static routes.</text>
    <text class="tiny" x="14" y="140">Requirement: all PCs ping across LANs; design routes, summarize checks, and plan ACL/NAT if Internet/DMZ is added.</text>
  </g>
</svg>
